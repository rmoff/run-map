<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>run-map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div id="map"></div>

  <!-- Bottom-left settings button -->
  <div id="top-controls">
    <button id="open-settings" class="icon-btn" aria-label="Settings" title="Settings">⚙</button>
  </div>

  <!-- Background-activity pill (bottom-centre) -->
  <div id="bg-status" class="hidden floating-pill"></div>

  <!-- Loading spinner with status label -->
  <div id="spinner" class="hidden" aria-hidden="true">
    <div class="spin"></div>
    <div id="spinner-label">Loading…</div>
  </div>

  <!-- Right rail: matches list above, embed preview below -->
  <div id="right-rail">
    <div id="matches-panel" class="hidden">
      <button id="matches-close" class="icon-btn" aria-label="Close">×</button>
      <div id="matches-content"></div>
    </div>
    <div id="preview-panel" class="hidden">
      <button id="preview-close" class="icon-btn" aria-label="Close">×</button>
      <div id="preview-content"></div>
    </div>
  </div>

  <!-- Toast (info messages) -->
  <div id="toast" class="hidden">
    <span id="toast-text"></span>
    <button id="toast-close" class="icon-btn" aria-label="Dismiss">×</button>
  </div>

  <!-- View menu (anchored under the map's view button) -->
  <div id="view-menu" class="hidden" role="menu">
    <button data-view="all">All data</button>
    <button data-view="recent90">Last 90 days</button>
    <button data-view="dense">Most traversed area</button>
  </div>

  <!-- Settings drawer -->
  <aside id="settings-drawer" class="hidden" aria-hidden="true">
    <header>
      <h2>Settings</h2>
      <button id="close-settings" class="icon-btn" aria-label="Close">×</button>
    </header>

    <div class="drawer-body">
      <section id="library-stats" class="data-section" style="margin-top:0;padding-top:0;border-top:none">
        <h3>Your library</h3>
        <div id="stats-content"><p class="muted">No data yet.</p></div>
      </section>

      <h3>Map</h3>
      <label for="base-layer">Base layer</label>
      <select id="base-layer">
        <option>Topo (OpenTopoMap)</option>
        <option>OpenStreetMap</option>
        <option>Light (Carto)</option>
        <option>Cycle (CyclOSM)</option>
        <option>Satellite</option>
      </select>
      <label for="base-opacity">Base opacity: <span id="opacity-label">50</span>%</label>
      <input type="range" id="base-opacity" min="10" max="100" step="5" value="50">

      <label for="search-radius">Search radius: <span id="search-radius-label">auto</span></label>
      <div class="row">
        <input type="range" id="search-radius" min="0" max="500" step="10" value="0" style="flex:1">
        <button id="apply-radius" class="ghost">Apply</button>
      </div>


      <label class="check-row">
        <input type="checkbox" id="lock-to-track" checked>
        Lock tap to nearest track
      </label>

      <label class="check-row">
        <input type="checkbox" id="zoom-to-fit-matches">
        Zoom to fit matched tracks
      </label>

      <section class="data-section">
        <div class="section-header">
          <h3>Strava API</h3>
          <button id="test-creds" class="ghost" hidden>Test connection</button>
        </div>
        <div id="test-status" class="status"></div>

        <details id="creds-details">
          <summary>Credentials</summary>
          <label for="cid">Client ID</label>
          <input id="cid" autocomplete="off">
          <label for="csec">Client Secret</label>
          <input id="csec" type="password" autocomplete="off">
          <div class="row">
            <button id="save-creds">Save</button>
            <button id="forget-tokens" class="ghost" hidden>Forget tokens</button>
          </div>
        </details>

        <div id="strava-auth"></div>
        <div id="strava-sync"></div>
      </section>

      <section class="data-section">
        <h3>Import Strava export ZIP</h3>
        <input type="file" id="zip-input" accept=".zip">
        <div id="zip-status" class="status"></div>
      </section>
    </div>
  </aside>

  <!-- Scrim behind drawer -->
  <div id="scrim" class="hidden"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>
  <script src="https://unpkg.com/h3-js@4.1.0/dist/h3-js.umd.js"></script>
  <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
