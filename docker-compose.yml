services:
  app:
    build: .
    image: run-map
    container_name: run-map
    ports:
      - "8501:8501"
    volumes:
      - ./data:/data
      - ./src:/app/src
    environment:
      STRAVA_CLIENT_ID: ${STRAVA_CLIENT_ID:-}
      STRAVA_CLIENT_SECRET: ${STRAVA_CLIENT_SECRET:-}
      # Serve-time minimum distance for hikes/walks (km). Short hikes are
      # still imported; changing this needs only a container restart.
      RUN_MAP_HIKE_MIN_KM: ${RUN_MAP_HIKE_MIN_KM:-5}
      PYTHONPATH: /app/src
    restart: unless-stopped
